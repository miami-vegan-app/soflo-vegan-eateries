name: Data source health check

# Verifies the Google Sheet is still reachable and well-formed. If it can't be
# fetched or looks broken, it opens (or updates) a GitHub Issue so the maintainer
# is alerted, instead of silently serving stale data.

on:
  schedule:
    - cron: "30 8 * * *" # daily, shortly after the data update
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and validate the sheet
        id: check
        continue-on-error: true
        run: |
          URL="https://docs.google.com/spreadsheets/d/1DQ5ys0MHw22qWXmwC_rAbLs7gQfDjFpASDii9beP9zE/export?format=csv&gid=0"
          code=$(curl -sL -o sheet.csv -w "%{http_code}" "$URL")
          echo "HTTP status: $code"
          if [[ "$code" != "200" ]]; then
            echo "reason=Sheet returned HTTP $code." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if ! grep -qi "SOUTH FLORIDA VEGANS" sheet.csv; then
            echo "reason=Sheet content did not contain the expected title row." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          rows=$(grep -ciE "^[A-Za-z]" sheet.csv || true)
          echo "Approx data lines: $rows"
          if [[ "$rows" -lt 150 ]]; then
            echo "reason=Sheet had only $rows usable lines (expected 150+)." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "Sheet looks healthy."

      - name: Open or update an issue on failure
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const reason = `${{ steps.check.outputs.reason }}` || "The data source health check failed.";
            const title = "⚠️ Data source health check failed";
            const body = [
              `The daily health check for the Google Sheet failed.`,
              ``,
              `**Reason:** ${reason}`,
              ``,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `_This issue was opened automatically. It will be reused on repeat failures._`,
            ].join("\n");

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "health-check",
            });

            if (existing.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["health-check"],
              });
            }

      - name: Fail the job if the check failed
        if: steps.check.outcome == 'failure'
        run: exit 1
